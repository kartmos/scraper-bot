services:
  bot-insta:
    platform: linux/amd64
    build:
      context: ../../
      dockerfile: build/deploy/Dockerfile
    container_name: bot
    image: opezdal-beta
    restart: unless-stopped
    env_file:
      - path: ../../.env
        required: false
    environment:
      YT_DLP_PATH: /app/bin/yt-dlp
      LOG_FILE: /app/logs/bot.log
